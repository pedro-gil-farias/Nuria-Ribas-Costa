<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
  </head>

  <body>
    <header class="top">
      <div class="name">
        <a href="{{ '/' | relative_url }}">{{ site.title | default: 'Your Friend’s Name' }}</a>
      </div>

      <nav class="nav">
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="{{ '/work/' | relative_url }}" class="{% if page.url contains '/work' %}active{% endif %}">Work</a>
        <a href="{{ '/bio/' | relative_url }}" class="{% if page.url contains '/bio' %}active{% endif %}">Bio</a>
      </nav>
    </header>

    <aside class="left">
      <div class="role">
        Journalist<br/>
        Writer<br/>
        Moderator<br/>
        Radio show host
      </div>
    </aside>

    <main class="content">
      {{ content }}
    </main>

    <footer class="bottom">
      <a class="email" href="mailto:hello@example.com">hello@example.com</a>
    </footer>
  </body>
</html>
